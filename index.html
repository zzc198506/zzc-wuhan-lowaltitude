<body class="bg-gray-100 text-gray-700 h-screen w-screen overflow-hidden">
    <!-- 登录遮罩层 - 前端简单验证 -->
    <!-- 用户名: zhangzhaocai | 密码: Nihao123456! -->
    <!-- 目的: 阻挡路人随意访问 -->

    <style id="login-overlay-styles">
      .login-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #1e3a8a 0%, #0f172a 100%);
        z-index: 99999;
        display: flex;
        align-items: center;
        justify-content: center;
        animation: fadeIn 0.3s ease-out;
      }

      .login-box {
        background: rgba(255, 255, 255, 0.95);
        padding: 2.5rem 2rem;
        border-radius: 12px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        max-width: 320px;
        width: 90%;
      }

      .login-title {
        font-size: 1.5rem;
        font-weight: 600;
        color: #1e3a8a;
        margin-bottom: 0.5rem;
        text-align: center;
      }

      .login-subtitle {
        font-size: 0.85rem;
        color: #64748b;
        margin-bottom: 1.5rem;
        text-align: center;
      }

      .login-field {
        margin-bottom: 1rem;
      }

      .login-label {
        display: block;
        font-size: 0.85rem;
        color: #475569;
        margin-bottom: 0.4rem;
      }

      .login-input {
        width: 100%;
        padding: 0.75rem 1rem;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        font-size: 1rem;
        transition: border-color 0.2s, box-shadow 0.2s;
      }

      .login-input:focus {
        outline: none;
        border-color: #3b82f6;
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
      }

      .login-btn {
        width: 100%;
        padding: 0.75rem;
        background: #1e40af;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 1rem;
        font-weight: 500;
        cursor: pointer;
        transition: background 0.2s;
      }

      .login-btn:hover {
        background: #1e3a8a;
      }

      .login-error {
        color: #ef4444;
        font-size: 0.85rem;
        margin-top: 0.75rem;
        text-align: center;
        display: none;
      }

      .login-overlay.hidden {
        display: none;
      }

      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
    </style>

    <div id="login-overlay" class="login-overlay">
      <div class="login-box">
        <div class="login-title">访问验证</div>
        <div class="login-subtitle">请输入访问凭证</div>
        <div class="login-field">
          <label class="login-label">用户名</label>
          <input type="text" id="login-username" class="login-input" placeholder="请输入用户名" autocomplete="username">
        </div>
        <div class="login-field">
          <label class="login-label">密码</label>
          <input type="password" id="login-password" class="login-input" placeholder="请输入密码" autocomplete="current-password">
        </div>
        <button id="login-submit" class="login-btn">登录</button>
        <div id="login-error" class="login-error">用户名或密码错误</div>
      </div>
    </div>

    <script id="login-overlay-script">
    (function() {
      const VALID_USERNAME = 'zhangzhaocai';
      const VALID_PASSWORD = 'Nihao123456!';
      const STORAGE_KEY = 'portal_auth_wuhan';

      function checkAuth() {
        const auth = localStorage.getItem(STORAGE_KEY);
        if (auth === 'authenticated') {
          hideOverlay();
        }
      }

      function hideOverlay() {
        const overlay = document.getElementById('login-overlay');
        if (overlay) {
          overlay.classList.add('hidden');
        }
      }

      function showError() {
        const error = document.getElementById('login-error');
        if (error) {
          error.style.display = 'block';
          setTimeout(function() {
            error.style.display = 'none';
          }, 3000);
        }
      }

      function handleLogin() {
        const username = document.getElementById('login-username').value;
        const password = document.getElementById('login-password').value;

        if (username === VALID_USERNAME && password === VALID_PASSWORD) {
          localStorage.setItem(STORAGE_KEY, 'authenticated');
          hideOverlay();
        } else {
          showError();
        }
      }

      // 初始化
      checkAuth();

      // 绑定事件
      document.getElementById('login-submit').addEventListener('click', handleLogin);

      document.getElementById('login-password').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
          handleLogin();
        }
      });
    })();
    </script>

    <div id="root" class="h-full w-full"></div>
</body>
</html>
